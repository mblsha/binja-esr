name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          git clone --depth 1 https://github.com/Vector35/binaryninja-api.git
          python binaryninja-api/scripts/install_api.py
      - name: Run linters and tests
        run: |
          ruff check sc62015
          mypy --explicit-package-bases sc62015/pysc62015
          pytest -vv sc62015/pysc62015
